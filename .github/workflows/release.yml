name: release

on:
  push:
    branches:
      - test/**
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  snapshot:
    if: startsWith(github.ref, 'refs/heads/test/')
    runs-on: [self-hosted, linux, x64, go-release, pchome-cli]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.15.1
          args: release --snapshot --skip=publish --clean

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, x64, go-release, pchome-cli]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.15.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_REPOS_TOKEN: ${{ secrets.PACKAGE_REPOS_TOKEN }}
