version: 2

project_name: pchome-cli

builds:
  - id: pchome
    main: ./cmd/pchome
    binary: pchome
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/oliy/pchome-cli/cmd.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - pchome
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    wrap_in_directory: true
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^Merge pull request"
      - "^Merge branch"

release:
  prerelease: auto

brews:
  - name: pchome-cli
    ids:
      - default
    directory: Formula
    homepage: https://github.com/oliyy/pchome-cli
    description: PChome 24h CLI for search, compare, and recommendations
    license: MIT
    commit_msg_template: "brew: update {{ .ProjectName }} to {{ .Tag }}"
    skip_upload: auto
    test: |
      system "#{bin}/pchome", "--version"
    repository:
      owner: oliyy
      name: homebrew-tap
      branch: main
      token: "{{ .Env.PACKAGE_REPOS_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

scoops:
  - name: pchome-cli
    homepage: https://github.com/oliyy/pchome-cli
    description: PChome 24h CLI for search, compare, and recommendations
    license: MIT
    commit_msg_template: "scoop: update {{ .ProjectName }} to {{ .Tag }}"
    skip_upload: auto
    repository:
      owner: oliyy
      name: scoop-bucket
      branch: main
      token: "{{ .Env.PACKAGE_REPOS_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
